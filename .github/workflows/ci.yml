name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Unit tests
        run: npm test
      - name: Build
        run: npm run build
      - name: Syntax-check bundles
        run: |
          for f in dist/*.js; do node --check "$f"; done
      - name: Validate manifest
        run: node -e "const m=require('./dist/manifest.json'); if(m.manifest_version!==3) throw new Error('manifest_version must be 3')"
