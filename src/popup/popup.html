<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>GitHub Docs Tab</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <img src="icons/icon32.png" width="20" height="20" alt="" />
    <strong>GitHub Docs Tab</strong>
  </header>
  <p class="how">Open any GitHub repository — a <strong>Docs</strong> tab appears next to Code and Issues whenever the
    repo contains markdown documentation.</p>
  <div class="line"><span id="token-dot" class="dot"></span><span id="token-text">Checking token…</span></div>
  <div class="cache">
    <div class="cache-head" id="cache-count">Cached repositories</div>
    <ul class="cache-list" id="cache-list"></ul>
  </div>
  <div class="buttons">
    <button id="open-options" type="button">Options</button>
    <button id="clear-cache" type="button">Clear cached listings &amp; file content</button>
  </div>
  <p id="blob-stats" class="how" style="margin-top:8px"></p>
  <p id="status" class="status" hidden></p>
  <script src="popup.js"></script>
</body>
</html>
